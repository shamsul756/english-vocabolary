<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Vocabulary | Learn English</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="0" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-10 mt-3 w-52 p-2 shadow">
                        <li><a href="#"><i class="fa-solid fa-circle-question"></i> FAQ</a></li>
                        <li><a href="#"><i class="fa-brands fa-leanpub"></i> Learn</a></li>
                    </ul>
                </div>
                <a href="#" class="flex items-center gap-1 ml-2">
                    <span class="text-lg font-bold">English</span>
                    <img src="./assets/logo.png" alt="" class="w-8">
                    <span class="text-lg font-semibold">জানালা</span>
                </a>
            </div>
            <div class="navbar-end hidden lg:flex">
                <ul class="menu menu-horizontal px-1 gap-4">
                    <li><a class="btn btn-outline btn-primary">FAQ</a></li>
                    <li><a class="btn btn-outline btn-primary">Learn</a></li>
                </ul>
            </div>
        </div>
    </header>

    <main>
        <section class="flex flex-col-reverse md:flex-row gap-10 justify-between items-center py-5 w-11/12 mx-auto">
            <div class="content flex-1 text-center md:text-left">
                <h2 class="text-4xl font-bold mb-8"><span class="text-sky-600">English</span> is Easy!!</h2>
                <p>আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন।</p>
                <div class="mt-5 space-y-3">
                    <input type="text" placeholder="Enter Your Name" class="input input-bordered w-full max-w-xs"><br>
                    <button class="btn btn-primary">Get Started</button>
                </div>
            </div>
            <div class="img flex-1">
                <img src="./assets/hero-student.png" alt="Hero">
            </div>
        </section>

        <section class="py-10">
            <h2 class="text-4xl font-bold mb-8 text-center"><span class="text-cyan-500">Lets</span> Learn Vocabulary</h2>
            <div id="level-container" class="flex flex-wrap gap-5 justify-center"></div>
        </section>

        <section class="flex justify-center my-5">
            <div class="join">
                <input id="input-search" type="text" placeholder="Search vocabulary now" class="input input-bordered join-item" />
                <button id="btn-search" class="btn btn-primary join-item">Search</button>
            </div>
        </section>

        <section id="spinner" class="flex justify-center items-center py-10 hidden">
            <span class="loading loading-bars loading-xl"></span>
        </section>

        <section id="word-container" class="bg-gray-100 p-10 w-11/12 mx-auto my-10 grid grid-cols-1 md:grid-cols-3 gap-5">
            <div class="text-center bg-sky-200 col-span-full rounded-xl py-10 space-y-6">
                <p class="text-xl font-medium text-gray-500">আপনি এখনো কোনো Lesson Select করেননি</p>
                <h2 class="font-bold text-4xl">একটি Lesson Select করুন।</h2>
            </div>
        </section>
    </main>

    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="details-container" class="space-y-5"></div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
